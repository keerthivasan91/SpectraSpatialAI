<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="spatialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#6EE7F7" />
    </linearGradient>
    <linearGradient id="spectralGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6EE7F7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6EE7F7" stop-opacity="1" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <rect x="15" y="15" width="40" height="40" rx="6" fill="none" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <rect x="25" y="25" width="40" height="40" rx="6" fill="none" stroke="#6EE7F7" stroke-width="2"/>
    
    <path d="M 20 55 Q 32.5 35, 45 55 T 70 55" fill="none" stroke="url(#spectralGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 20 45 Q 32.5 25, 45 45 T 70 45" fill="none" stroke="url(#spectralGrad)" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
    
    <circle cx="45" cy="45" r="5" fill="#F8FAFC" />
    <circle cx="45" cy="45" r="9" fill="none" stroke="#6EE7F7" stroke-width="1" opacity="0.7" style="animation: pulse 2s infinite;"/>
  </g>

  <g transform="translate(110, 68)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" fill="#F8FAFC" letter-spacing="0.03em">
      Spectra<tspan fill="url(#spatialGrad)">Spatial</tspan>
    </text>
    <text x="258" y="0" font-family="monospace" font-size="28" font-weight="700" fill="#6EE7F7" letter-spacing="0.1em">
      AI
    </text>
  </g>
</svg>
